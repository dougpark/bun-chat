<div id="view-announcements"
    class="absolute inset-0 flex flex-col bg-slate-50 dark:bg-vsdark-secondary z-20 transition-transform duration-300 ease-in-out transform translate-x-full pb-16">
    <header
        class="bg-white dark:bg-vsdark-surface text-orange-500 dark:text-vsdark-text p-4 shadow-md flex justify-between items-center">
        <div class="flex items-center gap-2">
            <button onclick="openAdmin()"
                class="mr-2 text-slate-500 dark:text-vsdark-text-secondary hover:text-vsdark-active5">
                <span class="icon-back"></span>
            </button>
            <h1 class="text-xl font-bold">Announcements</h1>
        </div>
    </header>
    <main class="flex-1 overflow-y-auto p-4 space-y-4">
        <!-- Current Announcement Section -->
        <div
            class="bg-white dark:bg-vsdark-surface p-4 rounded-lg shadow-sm border border-slate-200 dark:border-vsdark-border">
            <h2 class="text-lg font-bold mb-3 dark:text-vsdark-text">Current Announcement</h2>
            <div id="current-announcement-display"
                class="p-3 bg-slate-50 dark:bg-vsdark-input rounded border border-slate-200 dark:border-vsdark-border-light">
                <p class="text-sm text-slate-500 dark:text-vsdark-text-secondary text-center">No active
                    announcement</p>
            </div>
            <button id="btn-clear-announcement" onclick="clearCurrentAnnouncement()" disabled
                class="w-full mt-3 py-2 bg-red-600 text-white rounded font-bold hover:bg-red-700 transition-colors disabled:bg-slate-300 disabled:cursor-not-allowed">
                Clear Current Announcement
            </button>
        </div>

        <!-- Create New Announcement Section -->
        <div
            class="bg-white dark:bg-vsdark-surface p-4 rounded-lg shadow-sm border border-slate-200 dark:border-vsdark-border">
            <h2 class="text-lg font-bold mb-3 dark:text-vsdark-text">Publish New Announcement</h2>
            <form id="announcement-form" class="space-y-4">
                <div>
                    <label class="block text-sm font-medium text-slate-700 dark:text-vsdark-text-dim mb-1">
                        Announcement Text
                    </label>
                    <textarea id="announcement-text-input" name="announcement_text" rows="4" required
                        placeholder="Enter announcement message..."
                        class="w-full p-2 rounded border border-slate-300 dark:border-vsdark-border-light bg-slate-50 dark:bg-vsdark-input dark:text-vsdark-text focus:ring-2 focus:ring-orange-500 outline-none resize-none"></textarea>
                </div>
                <div>
                    <label class="block text-sm font-medium text-slate-700 dark:text-vsdark-text-dim mb-1">
                        Hazard Level
                    </label>
                    <select id="announcement-hazard-level-input" name="hazard_level_id"
                        class="w-full p-2 rounded border border-slate-300 dark:border-vsdark-border-light bg-slate-50 dark:bg-vsdark-input dark:text-vsdark-text focus:ring-2 focus:ring-orange-500 outline-none">
                        <!-- Options populated dynamically from ZONE_LEVELS -->
                    </select>
                </div>
                <div class="pt-2">
                    <button type="submit"
                        class="w-full py-2 bg-amber-600 text-white rounded font-bold hover:bg-amber-700 transition-colors">
                        Publish Announcement
                    </button>
                </div>
            </form>
            <div id="announcement-message" class="text-center text-sm mt-2 hidden"></div>
        </div>

        <!-- Announcements History Section -->
        <div
            class="bg-white dark:bg-vsdark-surface p-4 rounded-lg shadow-sm border border-slate-200 dark:border-vsdark-border">
            <h2 class="text-lg font-bold mb-3 dark:text-vsdark-text">History</h2>
            <div id="announcements-history-list" class="space-y-2">
                <!-- History items injected here -->
            </div>
        </div>
    </main>
</div>
