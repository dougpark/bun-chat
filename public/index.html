<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Bun Chat</title>
    <!-- Placeholder for local Tailwind CSS -->

    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    <style type="text/tailwindcss">
        @custom-variant dark (&:where(.dark, .dark *));
    </style>
    <link rel="stylesheet" href="/static/style.css">
</head>

<body class="bg-slate-50 text-slate-900 dark:bg-slate-950 dark:text-slate-50 font-sans antialiased overflow-hidden">
    <div id="app"
        class="relative w-full h-full max-w-md mx-auto bg-white dark:bg-slate-900 shadow-xl overflow-hidden flex flex-col h-screen">

        <!-- View 1: Home / Directory -->
        <div id="view-home"
            class="absolute inset-0 flex flex-col bg-slate-50 dark:bg-slate-900 z-10 transition-transform duration-300 ease-in-out transform translate-x-0 pb-16">
            <header class="bg-indigo-700 dark:bg-indigo-900 text-white p-4 shadow-md">
                <h1 class="text-xl font-bold">Bun Chat Zones</h1>
            </header>
            <main id="zone-list" class="flex-1 overflow-y-auto p-4 space-y-2">
                <!-- Zone Items will be injected here -->
            </main>
        </div>

        <!-- View 2: Chat Zone (Initially off-screen to the right) -->
        <div id="view-chat"
            class="absolute inset-0 flex flex-col bg-slate-50 dark:bg-slate-900 z-20 transition-transform duration-300 ease-in-out transform translate-x-full pb-16">
            <!-- Header -->
            <header class="bg-indigo-700 dark:bg-indigo-900 text-white p-4 shadow-md flex-none">
                <div class="flex justify-between items-center">
                    <div class="flex items-center gap-2">
                        <button onclick="goHome()" class="mr-2 text-white/80 hover:text-white">
                            <svg class="h-6 w-6" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                                    d="M15 19l-7-7 7-7" />
                            </svg>
                        </button>
                        <h2 id="active-tag-name" class="text-xl font-bold">#general</h2>
                    </div>
                    <div class="flex items-center gap-2">
                        <span id="connection-status" class="w-3 h-3 bg-emerald-400 rounded-full animate-pulse"></span>
                        <span class="text-xs font-mono uppercase">Live</span>
                    </div>
                </div>
                <div id="hazard-bar"
                    class="mt-2 text-xs bg-emerald-500/20 p-1 rounded text-center border border-emerald-500/30">
                    Hazard Level: Clear (Green)
                </div>
            </header>

            <!-- Messages -->
            <main id="message-container" class="flex-1 overflow-y-auto p-4 space-y-4 bg-slate-50 dark:bg-slate-900">
                <!-- Messages will be injected here -->
            </main>

            <!-- Input Area -->
            <div class="p-4 bg-white dark:bg-slate-800 border-t border-slate-200 dark:border-slate-700 flex-none">
                <form id="post-form" class="flex gap-2">
                    <input type="text" id="post-content" placeholder="Message..."
                        class="flex-1 bg-slate-100 dark:bg-slate-700 border-none rounded-full px-4 py-2 focus:ring-2 focus:ring-indigo-500 outline-none text-slate-800 dark:text-slate-100 dark:placeholder-slate-400">
                    <button type="submit"
                        class="bg-indigo-600 text-white p-2 rounded-full hover:bg-indigo-700 transition-colors flex-none">
                        <svg xmlns="http://www.w3.org/2000/svg" class="h-6 w-6" fill="none" viewBox="0 0 24 24"
                            stroke="currentColor">
                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                                d="M12 19l9 2-9-18-9 18 9-2zm0 0v-8" />
                        </svg>
                    </button>
                </form>
            </div>
        </div>

        <!-- View 3: Settings (Initially off-screen) -->
        <div id="view-settings"
            class="absolute inset-0 flex flex-col bg-slate-50 dark:bg-slate-900 z-20 transition-transform duration-300 ease-in-out transform translate-x-full pb-16">
            <header class="bg-indigo-700 dark:bg-indigo-900 text-white p-4 shadow-md">
                <h1 class="text-xl font-bold">Settings</h1>
            </header>
            <main class="flex-1 overflow-y-auto p-4 space-y-4">
                <div
                    class="bg-white dark:bg-slate-800 p-4 rounded-lg shadow-sm border border-slate-200 dark:border-slate-700">
                    <h2 class="text-lg font-bold mb-4 dark:text-white">Appearance</h2>
                    <div class="flex items-center justify-between">
                        <span class="text-slate-700 dark:text-slate-300">Dark Mode</span>
                        <button id="theme-toggle" onclick="toggleTheme()"
                            class="relative inline-flex h-6 w-11 items-center rounded-full bg-slate-200 dark:bg-indigo-600 transition-colors focus:outline-none focus:ring-2 focus:ring-indigo-500 focus:ring-offset-2 cursor-pointer">
                            <span class="sr-only">Use setting</span>
                            <span id="theme-toggle-knob"
                                class="translate-x-1 inline-block h-4 w-4 transform rounded-full bg-white transition-transform dark:translate-x-6"></span>
                        </button>
                    </div>
                </div>
            </main>
        </div>

        <!-- Bottom Nav (Persistent) -->
        <nav
            class="absolute bottom-0 left-0 right-0 z-30 flex justify-around bg-white dark:bg-slate-900 border-t border-slate-200 dark:border-slate-700 py-3 shadow-[0_-4px_10px_rgba(0,0,0,0.05)] h-16">
            <button onclick="goHome()" class="flex flex-col items-center text-indigo-600 dark:text-indigo-400">
                <svg class="h-6 w-6" fill="currentColor" viewBox="0 0 24 24">
                    <path d="M10 20v-6h4v6h5v-8h3L12 3 2 12h3v8z" />
                </svg>
                <span class="text-[10px] font-bold">Home</span>
            </button>
            <button
                class="flex flex-col items-center text-slate-400 dark:text-slate-500 hover:text-indigo-600 dark:hover:text-indigo-400">
                <svg class="h-6 w-6" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                    <path stroke-width="2"
                        d="M15 17h5l-1.405-1.405A2.032 2.032 0 0118 14.158V11a6.002 6.002 0 00-4-5.659V5a2 2 0 10-4 0v.341C7.67 6.165 6 8.388 6 11v3.159c0 .538-.214 1.055-.595 1.436L4 17h5m6 0v1a3 3 0 11-6 0v-1m6 0H9" />
                </svg>
                <span class="text-[10px] font-bold">Alerts</span>
            </button>
            <button
                class="flex flex-col items-center text-slate-400 dark:text-slate-500 hover:text-indigo-600 dark:hover:text-indigo-400">
                <svg class="h-6 w-6" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                    <path stroke-width="2" d="M16 7a4 4 0 11-8 0 4 4 0 018 0zM12 14a7 7 0 00-7 7h14a7 7 0 00-7-7z" />
                </svg>
                <span class="text-[10px] font-bold">Profile</span>
            </button>
            <button onclick="openSettings()"
                class="flex flex-col items-center text-slate-400 dark:text-slate-500 hover:text-indigo-600 dark:hover:text-indigo-400">
                <svg xmlns="http://www.w3.org/2000/svg" class="h-6 w-6" fill="none" viewBox="0 0 24 24"
                    stroke="currentColor">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                        d="M10.325 4.317c.426-1.756 2.924-1.756 3.35 0a1.724 1.724 0 002.573 1.066c1.543-.94 3.31.826 2.37 2.37a1.724 1.724 0 001.065 2.572c1.756.426 1.756 2.924 0 3.35a1.724 1.724 0 00-1.066 2.573c.94 1.543-.826 3.31-2.37 2.37a1.724 1.724 0 00-2.572 1.065c-.426 1.756-2.924 1.756-3.35 0a1.724 1.724 0 00-2.573-1.066c-1.543.94-3.31-.826-2.37-2.37a1.724 1.724 0 00-1.065-2.572c-1.756-.426-1.756-2.924 0-3.35a1.724 1.724 0 001.066-2.573c-.94-1.543.826-3.31 2.37-2.37.996.608 2.296.07 2.572-1.065z" />
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                        d="M15 12a3 3 0 11-6 0 3 3 0 016 0z" />
                </svg>
                <span class="text-[10px] font-bold">Settings</span>
            </button>
        </nav>

    </div>
    <script src="/static/script.js"></script>
</body>

</html>
